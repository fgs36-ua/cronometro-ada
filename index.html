<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cronómetro de Debate - Asociación de Debate de Alicante</title>
    <meta name="description" content="Cronómetro web diseñado para la Asociación de Debate de Alicante que soporta múltiples formatos de debate con configuración flexible y visualización optimizada para proyección." />

    <!-- Open Graph / SEO -->
    <meta property="og:site_name" content="Asociación de Debate de Alicante" />
    <meta property="og:title" content="Cronómetro de Debate" />
    <meta property="og:description" content="Cronómetro web diseñado para la Asociación de Debate de Alicante que soporta múltiples formatos de debate con configuración flexible y visualización optimizada para proyección." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cronometro-ada.vercel.app" />

    <link rel="icon" type="image/png" href="favicon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Botón de configuración -->
    <div class="config-toggle">
      <button class="config-btn" id="config-btn">Configuración</button>

      <!-- Selector de formato -->
      <div class="format-selector-panel">
        <button class="format-btn active" data-format="academico">
          Formato Académico
        </button>
        <button class="format-btn" data-format="bp">British Parliament</button>
      </div>
    </div>

    <!-- Config Drawer (Izquierda) -->
    <div class="drawer-backdrop" id="config-backdrop"></div>
    <aside class="drawer drawer-left" id="config-panel">
      <div class="drawer-header">
        <h3>Configuración</h3>
        <button class="drawer-close" id="config-close">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4.5 4.5l9 9m0-9l-9 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="drawer-body">
        <!-- Formato Académico -->
        <details class="config-section" id="academico-config" open>
          <summary class="section-header">
            <span>Formato Académico</span>
            <svg class="chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </summary>
          <div class="section-body">
            <div class="field-group">
              <label for="equipo1-name">Nombre Equipo 1</label>
              <input type="text" id="equipo1-name" value="Equipo A" placeholder="Ej: Equipo A" />
            </div>
            <div class="field-group">
              <label for="equipo2-name">Nombre Equipo 2</label>
              <input type="text" id="equipo2-name" value="Equipo B" placeholder="Ej: Equipo B" />
            </div>
            <div class="field-group">
              <label for="intro-time">Introducción (seg)</label>
              <div class="stepper">
                <button type="button" class="stepper-btn stepper-minus" data-target="intro-time" data-step="30">−</button>
                <input type="number" id="intro-time" value="240" min="0" step="30" />
                <button type="button" class="stepper-btn stepper-plus" data-target="intro-time" data-step="30">+</button>
              </div>
            </div>
            <div class="field-group">
              <label for="preguntas-time">Preguntas cruzadas (seg)</label>
              <div class="stepper">
                <button type="button" class="stepper-btn stepper-minus" data-target="preguntas-time" data-step="30">−</button>
                <input type="number" id="preguntas-time" value="120" min="0" step="30" />
                <button type="button" class="stepper-btn stepper-plus" data-target="preguntas-time" data-step="30">+</button>
              </div>
            </div>
            <div class="field-group">
              <label for="refutacion-time">Refutación (seg)</label>
              <div class="stepper">
                <button type="button" class="stepper-btn stepper-minus" data-target="refutacion-time" data-step="30">−</button>
                <input type="number" id="refutacion-time" value="300" min="0" step="30" />
                <button type="button" class="stepper-btn stepper-plus" data-target="refutacion-time" data-step="30">+</button>
              </div>
            </div>
            <div class="field-group">
              <label for="conclusion-time">Conclusión (seg)</label>
              <div class="stepper">
                <button type="button" class="stepper-btn stepper-minus" data-target="conclusion-time" data-step="30">−</button>
                <input type="number" id="conclusion-time" value="180" min="0" step="30" />
                <button type="button" class="stepper-btn stepper-plus" data-target="conclusion-time" data-step="30">+</button>
              </div>
            </div>
            <div class="field-group">
              <label for="num-refutaciones">Número de refutaciones</label>
              <div class="stepper">
                <button type="button" class="stepper-btn stepper-minus" data-target="num-refutaciones" data-step="1">−</button>
                <input type="number" id="num-refutaciones" value="3" min="1" max="10" step="1" />
                <button type="button" class="stepper-btn stepper-plus" data-target="num-refutaciones" data-step="1">+</button>
              </div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="ultima-refutacion-diferente" checked />
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
              <span class="toggle-label">Tiempo diferente para última refutación</span>
            </label>
            <div class="field-group" id="ultima-refutacion-config">
              <label for="ultima-refutacion-time">Última refutación (seg)</label>
              <div class="stepper">
                <button type="button" class="stepper-btn stepper-minus" data-target="ultima-refutacion-time" data-step="30">−</button>
                <input type="number" id="ultima-refutacion-time" value="90" min="0" step="30" />
                <button type="button" class="stepper-btn stepper-plus" data-target="ultima-refutacion-time" data-step="30">+</button>
              </div>
            </div>
          </div>
        </details>

        <!-- British Parliament -->
        <details class="config-section" id="bp-config">
          <summary class="section-header">
            <span>British Parliament</span>
            <svg class="chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </summary>
          <div class="section-body">
            <div class="field-group">
              <label for="bp-speech-time">Duración discursos (seg)</label>
              <div class="stepper">
                <button type="button" class="stepper-btn stepper-minus" data-target="bp-speech-time" data-step="30">−</button>
                <input type="number" id="bp-speech-time" value="420" min="0" step="30" />
                <button type="button" class="stepper-btn stepper-plus" data-target="bp-speech-time" data-step="30">+</button>
              </div>
            </div>
            <div class="field-group">
              <label for="equipo-camara-alta-favor">Cámara Alta (a favor)</label>
              <input type="text" id="equipo-camara-alta-favor" value="Equipo A" placeholder="Ej: Equipo A" />
            </div>
            <div class="field-group">
              <label for="equipo-camara-alta-contra">Cámara Alta (en contra)</label>
              <input type="text" id="equipo-camara-alta-contra" value="Equipo B" placeholder="Ej: Equipo B" />
            </div>
            <div class="field-group">
              <label for="equipo-camara-baja-favor">Cámara Baja (a favor)</label>
              <input type="text" id="equipo-camara-baja-favor" value="Equipo C" placeholder="Ej: Equipo C" />
            </div>
            <div class="field-group">
              <label for="equipo-camara-baja-contra">Cámara Baja (en contra)</label>
              <input type="text" id="equipo-camara-baja-contra" value="Equipo D" placeholder="Ej: Equipo D" />
            </div>
          </div>
        </details>

        <!-- Fases Adicionales -->
        <details class="config-section" id="fases-adicionales-config">
          <summary class="section-header">
            <span>Fases Adicionales</span>
            <svg class="chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </summary>
          <div class="section-body">
            <div class="field-group">
              <label for="deliberacion-time">Deliberación (seg)</label>
              <div class="stepper">
                <button type="button" class="stepper-btn stepper-minus" data-target="deliberacion-time" data-step="60">−</button>
                <input type="number" id="deliberacion-time" value="600" min="0" step="60" />
                <button type="button" class="stepper-btn stepper-plus" data-target="deliberacion-time" data-step="60">+</button>
              </div>
            </div>
            <div class="field-group">
              <label for="deliberacion-desc">Descripción Deliberación</label>
              <input type="text" id="deliberacion-desc" value="Deliberación de jueces" placeholder="Ej: Deliberación de jueces" />
            </div>
            <div class="field-group">
              <label for="feedback-time">Feedback (seg)</label>
              <div class="stepper">
                <button type="button" class="stepper-btn stepper-minus" data-target="feedback-time" data-step="60">−</button>
                <input type="number" id="feedback-time" value="900" min="0" step="60" />
                <button type="button" class="stepper-btn stepper-plus" data-target="feedback-time" data-step="60">+</button>
              </div>
            </div>
            <div class="field-group">
              <label for="feedback-desc">Descripción Feedback</label>
              <input type="text" id="feedback-desc" value="Feedback" placeholder="Ej: Feedback" />
            </div>
          </div>
        </details>

        <!-- Controles -->
        <details class="config-section" id="controles-config">
          <summary class="section-header">
            <span>Controles</span>
            <svg class="chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </summary>
          <div class="section-body">
            <label class="toggle-switch">
              <input type="checkbox" id="keyboard-controls-enabled" checked />
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
              <span class="toggle-label">Activar controles de teclado</span>
            </label>
            <p class="field-hint">
              Permite usar atajos de teclado para controlar el cronómetro (Espacio, flechas, etc.)
            </p>
          </div>
        </details>
      </div>
      <div class="drawer-footer">
        <button class="btn btn-primary" id="apply-config-btn">
          Guardar y Aplicar
        </button>
        <button class="btn btn-ghost" id="reset-defaults-btn">
          Restaurar Valores
        </button>
      </div>
    </aside>

    <div class="container">
      <!-- Header integrado en el mismo contenedor -->
      <header>
        <img src="ada.png" alt="ADA Logo" class="logo" />
        <p class="subtitle">Asociación de Debate de Alicante</p>
      </header>

      <!-- Cronómetro en el mismo contenedor -->
      <div class="timer-display">
        <div class="current-speaker" id="current-speaker">
          Listo para comenzar
        </div>
        <div class="timer" id="timer">00:00</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>      <div class="controls">
        <button class="control-btn start" id="start-pause-btn">Iniciar</button>
        <button class="control-btn reset" id="reset-btn">Resetear Fase</button>
        <button class="control-btn reset-debate" id="reset-debate-btn">
          Resetear Debate
        </button>
      </div>

      <div class="navigation-controls" id="navigation-controls">
        <button class="nav-btn" id="prev-btn">← Anterior</button>
        <button class="nav-btn" id="next-btn">Siguiente →</button>
      </div>
    </div>

    <!-- Panel de fases desplegable a la derecha -->
    <div class="phases-toggle">
      <button class="phases-btn" id="phases-btn">Fases</button>
    </div>

    <div class="drawer-backdrop" id="phases-backdrop"></div>
    <aside class="drawer drawer-right" id="phases-panel">
      <div class="drawer-header">
        <h3>Fases del Debate</h3>
        <button class="drawer-close" id="phases-close">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4.5 4.5l9 9m0-9l-9 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="drawer-body">
        <div class="phases-list" id="phases-list">
          <!-- Fases generadas dinámicamente -->
        </div>
      </div>
    </aside>

    <!-- Botón de toggle para modo oscuro -->
    <button class="toggle-btn" id="dark-mode-toggle" title="Alternar modo oscuro">
      <div class="sun-rays"></div>
      <div class="main-circle"></div>
    </button>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
